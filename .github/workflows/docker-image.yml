name: Docker CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Login to Docker Hub (if secrets set)
        run: |
          if [ -n "${{ secrets.DOCKER_USERNAME }}" ] && [ -n "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          else
            echo "Docker Hub secrets not set — skipping login"
          fi

      - name: Build and push
        run: |
          TAGS="--tag ghcr.io/${{ github.repository }}:latest"
          if [ -n "${{ secrets.DOCKER_USERNAME }}" ]; then
            TAGS="$TAGS --tag ${{ secrets.DOCKER_USERNAME }}/tortor:latest"
          fi
          # If this is a version tag (e.g. v1.0, v2.3.1), also tag with the version
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VER="${{ github.ref_name }}"
            TAGS="$TAGS --tag ghcr.io/${{ github.repository }}:${VER}"
            if [ -n "${{ secrets.DOCKER_USERNAME }}" ]; then
              TAGS="$TAGS --tag ${{ secrets.DOCKER_USERNAME }}/tortor:${VER}"
            fi
            echo "Will also push version tags: ${VER}"
          fi
          docker buildx build . --push --file Dockerfile $TAGS \
            --platform linux/amd64,linux/arm64,linux/arm/v7
